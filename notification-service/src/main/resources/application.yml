spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ${spring.application.name}
      # Use ErrorHandlingDeserializer so deserialization issues are handled gracefully
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        # delegate classes used by the ErrorHandlingDeserializer
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.LongDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        # allow deserialization of your application's packages
        spring.json.trusted.packages: com.zuhaisoft.linkedInProject.*
        # map historical producer FQCNs to current consumer classes (back-compat)
        spring.json.type.mapping: "com.zuhaisoft.linkedInProject.ConnectionsService.event.UserConnectionRequestEvent:com.zuhaisoft.linkedInProject.connectionsService.event.UserConnectionRequestEvent,com.zuhaisoft.linkedInProject.ConnectionsService.event.UserConnectionAcceptEvent:com.zuhaisoft.linkedInProject.connectionsService.event.UserConnectionAcceptEvent"
