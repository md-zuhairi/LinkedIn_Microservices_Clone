apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myingress
  namespace: shuttle-apps
  labels:
    name: myingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: "/"
        pathType: Prefix
        backend:
          service: 
            name: api-gateway
            port: 
              number: 80